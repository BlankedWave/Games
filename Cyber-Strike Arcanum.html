<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber-Strike: Arcanum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00ff9d;
            --danger: #ff3e3e;
            --energy: #00d9ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020617;
            font-family: 'Rajdhani', sans-serif;
            color: white;
            touch-action: none;
        }

        canvas {
            display: block;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 157, 0.2);
            border-radius: 0.5rem;
            pointer-events: auto;
        }

        .ui-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .menu {
            position: absolute;
            inset: 0;
            background: rgba(2, 6, 23, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: all 0.5s ease;
        }

        .menu.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.1);
        }

        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 200;
        }

        .btn-action {
            font-family: 'Syncopate', sans-serif;
            padding: 1rem 2.5rem;
            border: 2px solid var(--accent);
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 4px;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .btn-action:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 30px var(--accent);
        }

        .ability-bar {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .ability-fill {
            height: 100%;
            width: 0%;
            background: var(--energy);
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>

<div class="scanline"></div>

<div id="mainMenu" class="menu">
    <h1 class="text-7xl font-bold mb-2 italic tracking-tighter" style="font-family: 'Syncopate'; color: var(--accent);">ARCANUM</h1>
    <p class="text-slate-400 mb-12 tracking-[0.5em] uppercase text-sm">Orbital Defense Protocol 2.5</p>
    <div class="flex flex-col gap-4 items-center">
        <button class="btn-action" onclick="initGame()">Connect</button>
        <p class="text-xs text-slate-500 mt-4">MOVE: MOUSE / TOUCH | ACTION: CLICK / HOLD</p>
    </div>
</div>

<div id="gameOver" class="menu hidden">
    <h2 class="text-5xl font-bold mb-4 text-red-500" style="font-family: 'Syncopate';">CORE BREACH</h2>
    <p id="statsLabel" class="text-xl mb-8 text-slate-300"></p>
    <button class="btn-action" onclick="initGame()">Reboot</button>
</div>

<div class="ui-overlay">
    <div class="flex justify-between items-start">
        <div class="glass-panel p-4 w-64">
            <div class="flex justify-between text-xs mb-1 uppercase font-bold text-emerald-400">
                <span>Core Stability</span>
                <span id="hpText">100%</span>
            </div>
            <div class="h-2 bg-slate-800 rounded-full overflow-hidden">
                <div id="hpBar" class="h-full bg-emerald-500 transition-all duration-300" style="width: 100%"></div>
            </div>
        </div>
        <div class="text-right glass-panel p-4">
            <div class="text-xs text-slate-400 uppercase tracking-widest">Efficiency</div>
            <div id="scoreLabel" class="text-3xl font-bold text-white leading-none">0.00</div>
        </div>
    </div>

    <div class="flex justify-center mb-8">
        <div class="glass-panel p-4 w-80">
            <div class="flex justify-between text-[10px] uppercase mb-1 text-sky-400">
                <span>Chronos Shift</span>
                <span id="energyText">Ready</span>
            </div>
            <div class="ability-bar">
                <div id="energyBar" class="ability-fill"></div>
            </div>
        </div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Configuration
    const CORE_RADIUS = 40;
    const SHIELD_WIDTH = 120;
    const SHIELD_THICKNESS = 10;
    const ROTATION_SMOOTHING = 0.15;
    
    // State
    let state = {
        active: false,
        score: 0,
        hp: 100,
        energy: 100,
        mouse: { x: 0, y: 0 },
        shieldAngle: 0,
        enemies: [],
        particles: [],
        lastTime: 0,
        difficulty: 1,
        isSlowMo: false
    };

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Input
    const updateMouse = (e) => {
        const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        state.mouse = { x, y };
    };
    window.addEventListener('mousemove', updateMouse);
    window.addEventListener('touchstart', (e) => {
        updateMouse(e);
        state.isSlowMo = true;
    });
    window.addEventListener('touchend', () => state.isSlowMo = false);
    window.addEventListener('mousedown', () => state.isSlowMo = true);
    window.addEventListener('mouseup', () => state.isSlowMo = false);

    function initGame() {
        state = {
            ...state,
            active: true,
            score: 0,
            hp: 100,
            energy: 100,
            enemies: [],
            particles: [],
            difficulty: 1,
            lastTime: performance.now()
        };
        document.getElementById('mainMenu').classList.add('hidden');
        document.getElementById('gameOver').classList.add('hidden');
        requestAnimationFrame(loop);
    }

    function spawnEnemy() {
        const side = Math.floor(Math.random() * 4);
        let x, y;
        if (side === 0) { x = Math.random() * canvas.width; y = -50; }
        else if (side === 1) { x = canvas.width + 50; y = Math.random() * canvas.height; }
        else if (side === 2) { x = Math.random() * canvas.width; y = canvas.height + 50; }
        else { x = -50; y = Math.random() * canvas.height; }

        const angle = Math.atan2(canvas.height/2 - y, canvas.width/2 - x);
        const speed = (2 + Math.random() * 2) * Math.pow(state.difficulty, 0.3);

        state.enemies.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            radius: 8 + Math.random() * 10,
            color: Math.random() > 0.8 ? '#00d9ff' : '#ff3e3e',
            pulse: 0
        });
    }

    function createExplosion(x, y, color, count = 8) {
        for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const force = Math.random() * 4 + 2;
            state.particles.push({
                x, y,
                vx: Math.cos(angle) * force,
                vy: Math.sin(angle) * force,
                life: 1.0,
                color
            });
        }
    }

    function loop(time) {
        if (!state.active) return;
        const dt = Math.min((time - state.lastTime) / 16.67, 3);
        state.lastTime = time;

        update(dt);
        draw();
        requestAnimationFrame(loop);
    }

    function update(dt) {
        // Slow motion logic
        const timeScale = state.isSlowMo && state.energy > 0 ? 0.25 : 1.0;
        if (state.isSlowMo && state.energy > 0) {
            state.energy -= 0.8 * dt;
        } else if (state.energy < 100) {
            state.energy += 0.2 * dt;
        }
        
        const effectiveDt = dt * timeScale;
        state.difficulty += 0.0005 * effectiveDt;
        state.score += 0.01 * effectiveDt;

        // Shield Logic
        const targetAngle = Math.atan2(state.mouse.y - canvas.height / 2, state.mouse.x - canvas.width / 2);
        let diff = targetAngle - state.shieldAngle;
        while (diff < -Math.PI) diff += Math.PI * 2;
        while (diff > Math.PI) diff -= Math.PI * 2;
        state.shieldAngle += diff * ROTATION_SMOOTHING;

        // Spawn logic
        if (Math.random() < 0.03 * state.difficulty) spawnEnemy();

        // Update Entities
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;

        for (let i = state.enemies.length - 1; i >= 0; i--) {
            const e = state.enemies[i];
            e.x += e.vx * effectiveDt;
            e.y += e.vy * effectiveDt;
            e.pulse += 0.1 * effectiveDt;

            const dist = Math.hypot(e.x - centerX, e.y - centerY);

            // Core Collision
            if (dist < CORE_RADIUS + e.radius) {
                state.hp -= 15;
                createExplosion(e.x, e.y, e.color, 15);
                state.enemies.splice(i, 1);
                if (state.hp <= 0) endGame();
                continue;
            }

            // Shield Collision
            const angleToEnemy = Math.atan2(e.y - centerY, e.x - centerX);
            let angleDiff = angleToEnemy - state.shieldAngle;
            while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
            while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;

            const shieldDetectionRadius = CORE_RADIUS + 25;
            if (dist < shieldDetectionRadius + e.radius && Math.abs(angleDiff) < 0.8) {
                createExplosion(e.x, e.y, '#00ff9d', 5);
                state.enemies.splice(i, 1);
                state.score += 5;
                state.energy = Math.min(100, state.energy + 2);
            }
        }

        for (let i = state.particles.length - 1; i >= 0; i--) {
            const p = state.particles[i];
            p.x += p.vx * effectiveDt;
            p.y += p.vy * effectiveDt;
            p.life -= 0.02 * effectiveDt;
            if (p.life <= 0) state.particles.splice(i, 1);
        }

        updateUI();
    }

    function updateUI() {
        document.getElementById('hpBar').style.width = state.hp + '%';
        document.getElementById('energyBar').style.width = state.energy + '%';
        document.getElementById('scoreLabel').innerText = state.score.toFixed(2);
        document.getElementById('hpText').innerText = Math.max(0, Math.ceil(state.hp)) + '%';
        document.getElementById('energyText').innerText = state.energy > 20 ? (state.isSlowMo ? 'ACTIVE' : 'READY') : 'CHARGING';
    }

    function draw() {
        ctx.fillStyle = '#020617';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const cx = canvas.width / 2;
        const cy = canvas.height / 2;

        // Grid Background
        ctx.strokeStyle = 'rgba(0, 255, 157, 0.05)';
        ctx.lineWidth = 1;
        const gridSize = 50;
        for(let x = 0; x < canvas.width; x += gridSize) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for(let y = 0; y < canvas.height; y += gridSize) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }

        // Particles
        state.particles.forEach(p => {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.globalAlpha = 1;

        // The Core
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#00ff9d';
        ctx.fillStyle = '#0f172a';
        ctx.strokeStyle = '#00ff9d';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(cx, cy, CORE_RADIUS, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        // Inner Core Pulse
        const p = Math.sin(Date.now() / 200) * 5;
        ctx.fillStyle = '#00ff9d';
        ctx.beginPath();
        ctx.arc(cx, cy, 10 + p, 0, Math.PI * 2);
        ctx.fill();

        // Shield
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(state.shieldAngle);
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#00ff9d';
        ctx.strokeStyle = '#00ff9d';
        ctx.lineWidth = SHIELD_THICKNESS;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.arc(0, 0, CORE_RADIUS + 15, -0.7, 0.7);
        ctx.stroke();
        
        // Shield Detail
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, CORE_RADIUS + 15, -0.3, 0.3);
        ctx.stroke();
        ctx.restore();

        // Enemies
        state.enemies.forEach(e => {
            ctx.shadowBlur = 10;
            ctx.shadowColor = e.color;
            ctx.fillStyle = e.color;
            const s = e.radius + Math.sin(e.pulse) * 2;
            
            ctx.beginPath();
            if (e.color === '#ff3e3e') {
                // Diamond shape for enemies
                ctx.moveTo(e.x, e.y - s);
                ctx.lineTo(e.x + s, e.y);
                ctx.lineTo(e.x, e.y + s);
                ctx.lineTo(e.x - s, e.y);
                ctx.closePath();
            } else {
                // Circle for "energy" type enemies (maybe for future powerups)
                ctx.arc(e.x, e.y, s, 0, Math.PI * 2);
            }
            ctx.fill();
        });

        ctx.shadowBlur = 0;
    }

    function endGame() {
        state.active = false;
        document.getElementById('gameOver').classList.remove('hidden');
        document.getElementById('statsLabel').innerText = `Sync Efficiency: ${state.score.toFixed(2)}%`;
    }

</script>
</body>
</html>
